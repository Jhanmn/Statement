name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore Statement.slnx

      - name: Build
        run: dotnet build Statement.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Statement.slnx --configuration Release --no-build --verbosity normal
